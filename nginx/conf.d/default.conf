server {
    listen 80;
    server_name musegenx1000.com www.musegenx1000.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect to HTTPS (Uncomment after obtaining certificates)
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # For initial setup (HTTP only), proxy directly. 
    # Comment this block out after enabling HTTPS.
    location / {
        proxy_pass http://web:7860;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

