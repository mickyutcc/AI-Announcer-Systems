[mypy]
python_version = 3.10
files = *.py, tests
exclude = (?x)(venv|\.venv|env|\.env|build|dist|\.git|site-packages|share/doc|examples)
ignore_missing_imports = True
warn_unused_configs = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_return_any = True
warn_unreachable = True
strict_equality = True

[mypy-networkx.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-mayavi.*]
ignore_missing_imports = True

[mypy-prometheus_client.*]
ignore_missing_imports = True

[mypy-pythainlp.*]
ignore_missing_imports = True
follow_imports = skip

[mypy-tests.*]
ignore_errors = True
