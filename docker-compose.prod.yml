services:
  web:
    build: .
    restart: always
    container_name: musegen_app
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_BASE_PATH=/app/assets
      - SQLITE_DB_PATH=/data/musegenx1000.db
    env_file:
      - .env.prod
    volumes:
      - assets_data:/app/assets
      - sqlite_data:/data
      - ./logs:/app/logs
    depends_on:
      - db
      - redis
    networks:
      - musegen_net

  db:
    image: postgres:15-alpine
    restart: always
    container_name: musegen_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - musegen_net

  redis:
    image: redis:alpine
    restart: always
    container_name: musegen_redis
    volumes:
      - redis_data:/data
    networks:
      - musegen_net

  nginx:
    image: nginx:alpine
    restart: always
    container_name: musegen_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - web
    networks:
      - musegen_net

  certbot:
    image: certbot/certbot
    container_name: musegen_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - musegen_net

volumes:
  postgres_data:
  redis_data:
  assets_data:
  sqlite_data:

networks:
  musegen_net:
    driver: bridge
