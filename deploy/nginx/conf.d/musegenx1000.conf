server {
    listen 80;
    server_name musegenx1000.com www.musegenx1000.com;

    # Redirect HTTP -> HTTPS
    location /.well-known/acme-challenge/ {
        # Let certbot (if run on host) use webroot path or handle via container mounting
        root /var/www/certbot;
    }
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name musegenx1000.com www.musegenx1000.com;

    # Paths to certs (mounted into container)
    ssl_certificate /etc/letsencrypt/live/musegenx1000.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/musegenx1000.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Proxy to app service (inside docker network)
    location / {
        proxy_pass http://app:7860;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Websocket / SSE for Gradio
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # Optional: healthcheck endpoint
    location /healthz {
        proxy_pass http://app:7860/healthz;
    }
}
