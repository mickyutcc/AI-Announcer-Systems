groups:
- name: musegenx1000_alerts
  rules:
  - alert: HighErrorRate
    expr: rate(http_requests_total{job="musegenx1000",status=~"5.."}[5m]) > 0.05
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: "High 5xx rate for musegenx1000"
      description: "5xx errors >5% in last 5m"

  - alert: HighSubscriptionApprovalLatency
    expr: histogram_quantile(0.9, sum(rate(subscription_approval_latency_seconds_bucket[1h])) by (le)) > 86400
    for: 30m
    labels:
      severity: warning
    annotations:
      summary: "High subscription approval latency"
      description: "90th percentile approval latency > 24h"
